# NOTE: Dependabot won't follow `labels: []`.
# https://github.com/dependabot/dependabot-core/issues/11783

version: 2

# TODO: Add support for bumping version of `packageManager` specified inside `package.json`.
# https://github.com/dependabot/dependabot-core/issues/4830
#
# TODO: Allow lower case commit message.
# https://github.com/dependabot/dependabot-core/issues/10586
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      # Runs every Monday.
      cronjob: '0 0 * * 1'
    open-pull-requests-limit: 10
    labels: ['build']
    commit-message:
      prefix: 'build'
      include: 'scope'
    groups:
      actions:
        patterns: ['@actions/*']
      commitlint:
        patterns: ['@commitlint/*']
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      # Runs every Monday.
      cronjob: '0 0 * * 1'
    open-pull-requests-limit: 10
    labels: ['ci']
    commit-message:
      prefix: 'ci'
      include: 'scope'
