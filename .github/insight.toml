[match]
dot = true

[schedule]
linters = ["node-audit"]

[formatters]
prettier = [
  "**/*.yml",
  "**/*.yaml",
  "!**/pnpm-lock.yaml",
  "**/*.ts",
  "**/*.md",
  "**/*.json",
]
tombi = ["**/*.toml"]

[linters]
node-audit = ["**/package.json", "**/pnpm-lock.yaml"]
node-dedupe = ["**/package.json", "**/pnpm-lock.yaml"]
trivy = ["**/package.json", "**/pnpm-lock.yaml"]
tsc = ["**/*.ts", "**/package.json", "**/pnpm-lock.yaml"]
check-dist = ["src/**/*.ts", "**/package.json", "**/pnpm-lock.yaml"]
typos = ["**/*", "!dist/**"]
yamllint = ["**/*.yml", "**/*.yaml", "!**/pnpm-lock.yaml"]
actionlint = [".github/workflows/*.yml"]
eslint = ["**/*.ts"]
ast-grep = ["**/*.ts"]
alex = ["**/*.md"]
markdownlint-cli2 = ["**/*.md"]
vale = ["**/*.md"]
tombi = ["**/*.toml"]

[args.linters]
yamllint = ["--strict"]
tombi = ["--error-on-warnings"]
eslint = ["--max-warnings", "0"]
