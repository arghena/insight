[match]
dot = true

[pr]
check-title = true
# https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/#languages-and-compilers
detect-changes = [
  { typescript = ["**/*.ts", "package.json", "pnpm-lock.yaml"] },
  { actions = [".github/workflows/*.yml", "action.yml"] }
]

[schedule]
tasks = ["node-audit"]

[push]
formatters = ["prettier"]
linters = ["check-dist", "eslint", "ast-grep"]

[args.linters]
yamllint = ["--strict"]
tombi = ["--error-on-warnings"]

[formatters]
prettier = ["**/*.yml", "**/*.ts", "**/*.md", "**/*.json"]
tombi = ["**/*.toml"]

[linters]
node-audit = ["package.json", "pnpm-lock.yaml"]
check-dist = ["src/**/*.ts", "package.json", "pnpm-lock.yaml"]
typos = ["**/*", "!dist/**"]
yamllint = ["**/*.yml"]
actionlint = [".github/workflows/*.yml"]
eslint = ["**/*.ts"]
ast-grep = ["**/*.ts"]
alex = ["**/*.md"]
markdownlint-cli2 = ["**/*.md"]
vale = ["**/*.md"]
tombi = ["**/*.toml"]
