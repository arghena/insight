[match]
dot = true

[pull_request]
check_title = true
# https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/#languages-and-compilers
detect_changes = ["**/*.ts", ".github/workflows/*.yml", "action.yml"]

[schedule]
tasks = ["node_audit"]

[push_tag]
formatters = ["prettier"]
linters = ["check_dist", "eslint", "ast_grep"]

[args.linters]
yamllint = ["--strict"]
tombi = ["--error-on-warnings"]

[formatters]
prettier = ["**/*.yml", "**/*.ts", "**/*.md", "**/*.json"]
tombi = ["**/*.toml"]

[linters]
node_audit = ["package.json", "pnpm-lock.yaml"]
check_dist = ["src/**/*.ts", "package.json", "pnpm-lock.yaml"]
typos = ["**/*", "!dist/**"]
yamllint = ["**/*.yml"]
actionlint = [".github/workflows/*.yml"]
eslint = ["**/*.ts"]
ast_grep = ["**/*.ts"]
alex = ["**/*.md"]
markdownlint_cli2 = ["**/*.md"]
vale = ["**/*.md"]
tombi = ["**/*.toml"]
