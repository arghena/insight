# TODO: Automatically publish the GitHub Action to the Marketplace.
# https://github.com/cli/cli/issues/5193

name: CD

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-canary.[0-9]+']

permissions:
  contents: read

jobs:
  create-release-note:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    name: Create release note
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Generate release note
        run: |
          if [[ $GITHUB_REF_NAME == *canary* ]]; then
            pnpm dlx changelogithub --prerelease
          else
            pnpm dlx changelogithub
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
