name: CodeQL

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

# https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/#languages-and-compilers
on:
  schedule:
    # Runs every Monday.
    - cron: '0 0 * * 1'
  push:
    branches: [canary]
    paths:
      - '**/*.ts'
      - '.github/workflows/*.yml'
      - '**/action.yml'
  pull_request:
    paths:
      - '**/*.ts'
      - '.github/workflows/*.yml'
      - '**/action.yml'

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    name: Run CodeQL
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning#changing-the-languages-that-are-analyzed
        language: ['typescript', 'actions']
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # https://codeql.github.com/codeql-query-help
          # https://docs.github.com/en/code-security/how-tos/scan-code-for-vulnerabilities/configure-code-scanning/customizing-your-advanced-setup-for-code-scanning#using-queries-in-ql-packs
          queries: security-and-quality
          config: |
            paths-ignore:
              - dist
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          # NOTE: Delete all the old dynamic analysis to get it back to work.
          # https://github.com/github/codeql-action/issues/1179#issuecomment-2050937338
          category: '/language:${{ matrix.language }}'
          # Only upload caches from the default branch.
          # https://github.com/github/codeql-action/blob/0ec47d036c68ae0cf94c629009b1029407111281/src/trap-caching.ts#L135
