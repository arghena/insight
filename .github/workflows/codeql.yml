name: CodeQL

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha || github.run_id }}
  cancel-in-progress: true

# https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/#languages-and-compilers
on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [canary]
    paths:
      - '**/*.ts'
      - '.github/workflows/*.yml'
      - '**/action.yml'
  pull_request:
    paths:
      - '**/*.ts'
      - '.github/workflows/*.yml'
      - '**/action.yml'

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
    name: Run CodeQL
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning#changing-the-languages-that-are-analyzed
        language: ['typescript', 'actions']
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2 # v4.32.2
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - dist
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2 # v4.32.2
        with:
          # NOTE: Delete all the old dynamic analysis to get it back to work.
          # https://github.com/github/codeql-action/issues/1179#issuecomment-2050937338
          category: '/language:${{ matrix.language }}'
